# /etc/nginx/sites-available/drmahmud
# Dr. Mahmud Website + Clinic CMS
# Copy to: sudo cp deploy/nginx.conf /etc/nginx/sites-available/drmahmud
# Enable:  sudo ln -s /etc/nginx/sites-available/drmahmud /etc/nginx/sites-enabled/
# Test:    sudo nginx -t
# Reload:  sudo systemctl reload nginx

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name drmahmud.smshome.ae;
    return 301 https://$server_name$request_uri;
}

server {
    server_name drmahmud.smshome.ae;

    # File upload size limit (backup ZIP + patient files)
    client_max_body_size 50M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Next.js static assets (immutable, long cache)
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Main app
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / SSE support (real-time upload notifications)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # SSE: disable buffering for real-time events
        proxy_buffering off;
        proxy_cache off;

        # Long-lived connections (SSE streams stay open up to 11 min)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/drmahmud.smshome.ae/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/drmahmud.smshome.ae/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}
